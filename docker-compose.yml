version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sikap-backend
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./storage/app:/var/www/html/storage/app
      - ./storage/logs:/var/www/html/storage/logs
    networks:
      - sikap-network
    depends_on:
      - postgres
      - redis

  nginx:
    image: nginx:alpine
    container_name: sikap-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - sikap-network
    depends_on:
      - app

  postgres:
    image: postgres:15
    container_name: sikap-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sikap_dev
      POSTGRES_USER: sikap
      POSTGRES_PASSWORD: sikap_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - sikap-network

  redis:
    image: redis:7-alpine
    container_name: sikap-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - sikap-network

volumes:
  postgres_data:
  redis_data:

networks:
  sikap-network:
    driver: bridge
