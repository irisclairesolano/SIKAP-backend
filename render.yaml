  - type: worker
    name: sikap-queue
    env: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    buildOptions:
      - name: php
        value: "8.2-fpm"
    startCommand: php artisan queue:work --queue=default --sleep=3 --tries=3 --memory=256 --daemon
